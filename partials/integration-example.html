<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Integration Example - BE-TANGO</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="../images/cropped-favicon-32x32.png">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/form-validation.css">
  <link rel="stylesheet" href="../css/skeleton-loading.css">
  <link rel="stylesheet" href="../css/cookie-consent.css">
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <!-- ... header content ... -->
  </header>

  <!-- MAIN CONTENT -->
  <main>
    <!-- Example: Skeleton Loading for Journey Cards -->
    <section class="section">
      <div class="container">
        <div class="section-header">
          <h2>Our Tango Journey</h2>
        </div>

        <!-- Skeleton Loading (shown while content loads) -->
        <div class="skeleton-content">
          <div class="skeleton-grid skeleton-grid-3">
            <div class="skeleton-journey-card">
              <div class="skeleton-journey-image skeleton"></div>
              <div class="skeleton-journey-content">
                <div class="skeleton-journey-title skeleton"></div>
                <div class="skeleton-journey-text skeleton"></div>
                <div class="skeleton-journey-text skeleton skeleton-w-75"></div>
              </div>
            </div>
            <div class="skeleton-journey-card">
              <div class="skeleton-journey-image skeleton"></div>
              <div class="skeleton-journey-content">
                <div class="skeleton-journey-title skeleton"></div>
                <div class="skeleton-journey-text skeleton"></div>
                <div class="skeleton-journey-text skeleton skeleton-w-75"></div>
              </div>
            </div>
            <div class="skeleton-journey-card">
              <div class="skeleton-journey-image skeleton"></div>
              <div class="skeleton-journey-content">
                <div class="skeleton-journey-title skeleton"></div>
                <div class="skeleton-journey-text skeleton"></div>
                <div class="skeleton-journey-text skeleton skeleton-w-75"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Real Content (shown after loading) -->
        <div class="real-content">
          <div class="grid grid-3">
            <!-- ... real journey cards ... -->
          </div>
        </div>
      </div>
    </section>

    <!-- Example: Contact Form with Validation -->
    <section class="section bg-light">
      <div class="container">
        <div class="section-header">
          <h2>Contact Us</h2>
        </div>

        <div class="form-container">
          <form class="contact-form" id="contactForm" action="#" method="POST">
            <div class="form-row">
              <div class="form-group">
                <label for="name">Name <span class="required">*</span></label>
                <input type="text" id="name" name="name" required>
              </div>

              <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone"
                       pattern="[0-9()#&+*\-=.]+"
                       title="Only numbers and phone characters (#, -, *, etc) are accepted.">
              </div>
            </div>

            <div class="form-group">
              <label for="email">Email <span class="required">*</span></label>
              <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
              <label for="message">Message <span class="required">*</span></label>
              <textarea id="message" name="message" rows="6" required minlength="10"></textarea>
            </div>

            <div class="form-group checkbox-group">
              <label>
                <input type="checkbox" name="consent" required>
                I agree to receive information about BE-TANGO courses. <span class="required">*</span>
              </label>
            </div>

            <button type="submit" class="btn btn-primary btn-large btn-block">Send Message</button>
          </form>
        </div>
      </div>
    </section>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <!-- ... footer content ... -->
  </footer>

  <!-- Cookie Consent Banner (automatically added by JS) -->
  <!-- No HTML needed - the script creates it -->

  <!-- Scripts -->
  <script src="../js/cookie-consent.js"></script>
  <script src="../js/form-validation.js"></script>

  <script>
    // Example: Simulate content loading with skeleton
    document.addEventListener('DOMContentLoaded', function() {
      const section = document.querySelector('.section');

      // Show skeleton while loading
      section.classList.add('loading');

      // Simulate API call or image loading
      setTimeout(function() {
        // Hide skeleton, show real content
        section.classList.remove('loading');
        section.querySelector('.real-content').classList.add('content-loaded');
      }, 2000); // 2 second delay for demo
    });

    // Example: Listen for cookie consent changes
    document.addEventListener('cookieConsentChanged', function(e) {
      console.log('Cookie consent changed:', e.detail.consent);

      if (e.detail.consent === 'accepted') {
        // Enable analytics, tracking, etc.
        console.log('User accepted cookies - enable tracking');
      } else {
        // Disable analytics, tracking, etc.
        console.log('User declined cookies - disable tracking');
      }
    });

    // Example: Reset consent for testing
    // window.BETangoCookieConsent.resetConsent();
    // window.BETangoCookieConsent.showBanner();
  </script>
</body>
</html>
