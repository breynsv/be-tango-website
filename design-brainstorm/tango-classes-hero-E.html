<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero Redesign E — Frosted Text Block</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,600;0,700;0,900;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --black:  #000000;
      --gold:   #E2C033;
      --navy:   #1C244B;
      --accent: #00d084;
      --white:  #FFFFFF;
    }

    body { font-family: 'Poppins', sans-serif; }

    /* ── HERO — full viewport ── */
    .hero {
      position: relative;
      min-height: 720px;
      overflow: hidden;
      display: flex;
      align-items: center;
    }

    /* PHOTO — nearly full brightness */
    .hero-photo {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .hero-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 30%;
      display: block;
      /* high brightness, keep colors alive */
      filter: brightness(0.78);
      animation: drift 22s ease-in-out infinite alternate;
    }

    @keyframes drift {
      from { transform: scale(1.0); }
      to   { transform: scale(1.05) translateX(-1.5%); }
    }

    /* Minimal overlay — only subtle left shadow so photo dominates */
    .hero-scrim {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: linear-gradient(
        110deg,
        rgba(0,0,0,0.38) 0%,
        rgba(0,0,0,0.12) 45%,
        transparent 65%
      );
    }

    /* ── FROSTED GLASS TEXT BOX ── */
    .hero-inner {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 56px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0;
      align-items: center;
    }

    /* The frosted panel itself */
    .hero-panel {
      background: rgba(14, 16, 32, 0.52);
      backdrop-filter: blur(32px) saturate(1.4);
      -webkit-backdrop-filter: blur(32px) saturate(1.4);
      border: 1px solid rgba(255,255,255,0.1);
      border-right: none;
      padding: 56px 52px;
      max-width: 560px;
      position: relative;
      /* gold left accent bar */
    }

    .hero-panel::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: var(--gold);
    }

    /* Top gold rule inside panel */
    .hero-panel::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(to right, var(--gold), transparent);
    }

    .hero-label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 22px;
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    .hero-h1 {
      font-size: clamp(2.4rem, 4.5vw, 4.6rem);
      font-weight: 900;
      line-height: 1.02;
      color: var(--white);
      margin-bottom: 22px;
      opacity: 0;
      animation: fadeUp 0.7s 0.3s ease both;
    }

    .hero-h1 .gold-text {
      display: block;
      color: var(--gold);
      font-style: italic;
      font-weight: 700;
      font-size: 0.85em;
    }

    .hero-divider {
      width: 40px;
      height: 2px;
      background: var(--gold);
      margin-bottom: 22px;
      opacity: 0;
      animation: fadeUp 0.5s 0.5s ease both;
    }

    .hero-tagline {
      font-size: 0.9rem;
      font-weight: 300;
      line-height: 1.85;
      color: rgba(255,255,255,0.7);
      margin-bottom: 36px;
      opacity: 0;
      animation: fadeUp 0.7s 0.55s ease both;
    }

    .hero-cta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeUp 0.7s 0.75s ease both;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      padding: 13px 28px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .btn-primary {
      background: var(--gold);
      color: var(--black);
    }
    .btn-primary:hover {
      background: #f0d040;
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(226,192,51,0.45);
    }

    .btn-ghost {
      background: transparent;
      color: var(--white);
      border: 1.5px solid rgba(255,255,255,0.3);
    }
    .btn-ghost:hover {
      border-color: rgba(255,255,255,0.7);
      background: rgba(255,255,255,0.07);
    }

    /* Level pills right-anchored at bottom */
    .hero-levels {
      position: absolute;
      bottom: 40px;
      right: 56px;
      z-index: 3;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      opacity: 0;
      animation: fadeUp 0.7s 1.2s ease both;
    }

    .level-pill {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: default;
    }

    .pill-label {
      font-size: 0.58rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      white-space: nowrap;
      transition: color 0.2s;
    }

    .pill-bar {
      width: 2px;
      height: 28px;
      background: rgba(255,255,255,0.2);
      transition: all 0.2s;
    }

    .level-pill.active .pill-label { color: var(--gold); }
    .level-pill.active .pill-bar { background: var(--gold); height: 44px; box-shadow: 0 0 10px rgba(226,192,51,0.5); }

    .level-pill:hover .pill-label { color: rgba(255,255,255,0.75); }

    /* Scroll indicator */
    .hero-scroll {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 4;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      opacity: 0;
      animation: fadeUp 0.6s 1.6s ease both;
    }

    .scroll-label {
      font-size: 0.5rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.28);
    }

    .scroll-line {
      width: 1px;
      height: 36px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.35), transparent);
      animation: scrollAnim 2s 2s ease-in-out infinite;
    }

    @keyframes scrollAnim { 0%,100% { opacity:0.4 } 50% { opacity:1 } }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 860px) {
      .hero { min-height: 600px; align-items: flex-end; }
      .hero-inner { grid-template-columns: 1fr; padding: 0; }
      .hero-panel {
        max-width: 100%;
        padding: 40px 28px;
        border-right: 1px solid rgba(255,255,255,0.1);
        background: rgba(14,16,32,0.72);
      }
      .hero-levels { display: none; }
      .hero-scrim { background: rgba(0,0,0,0.25); }
    }
  </style>
</head>
<body>
  <!-- HERO E — FROSTED TEXT BLOCK (PHOTO BREATHES) -->
  <section class="hero" aria-label="Tango Classes Hero">
    <div class="hero-photo">
      <img src="../images/Tango-classes-in-Brussels.png" alt="Tango class in Brussels" width="1600" height="720">
    </div>
    <div class="hero-scrim"></div>

    <div class="hero-inner">
      <div class="hero-panel">
        <p class="hero-label">— Discover Your Tango Journey</p>
        <h1 class="hero-h1">
          Our Class Offer
          <span class="gold-text">From Beginner<br>to Advanced.</span>
        </h1>
        <div class="hero-divider"></div>
        <p class="hero-tagline">
          Welcome to our Brussels tango school. We offer a wide range of lessons for all levels — no partner needed to begin.
        </p>
        <div class="hero-cta">
          <a href="../tango-classes/beginners/" class="btn btn-primary">Info for Beginners</a>
          <a href="../tango-classes/experienced/#choose-your-level" class="btn btn-ghost">View Levels</a>
        </div>
      </div>
    </div>

    <!-- vertical level bars -->
    <div class="hero-levels" aria-label="Class levels">
      <div class="level-pill active">
        <span class="pill-label">Beginner</span>
        <div class="pill-bar"></div>
      </div>
      <div class="level-pill">
        <span class="pill-label">1st Year</span>
        <div class="pill-bar"></div>
      </div>
      <div class="level-pill">
        <span class="pill-label">2nd Year</span>
        <div class="pill-bar"></div>
      </div>
      <div class="level-pill">
        <span class="pill-label">Intermediate</span>
        <div class="pill-bar"></div>
      </div>
      <div class="level-pill">
        <span class="pill-label">Advanced</span>
        <div class="pill-bar"></div>
      </div>
    </div>

    <div class="hero-scroll" aria-hidden="true">
      <span class="scroll-label">Scroll</span>
      <div class="scroll-line"></div>
    </div>
  </section>
</body>
</html>
