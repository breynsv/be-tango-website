<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BE-TANGO — Tango Classes Hero I</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #F3F5F8;
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      width: 100%;
      height: 680px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Photo layer */
    .hero__photo {
      position: absolute;
      inset: 0;
      background-image: url('../images/Tango-classes-in-Brussels.png');
      background-size: cover;
      background-position: center top;
      filter: brightness(0.75);
      z-index: 0;
    }

    /* Very subtle vignette — dark only at edges/bottom, centre stays clear */
    .hero__vignette {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(
          ellipse 70% 60% at 50% 40%,
          transparent 40%,
          rgba(0, 0, 0, 0.45) 100%
        ),
        linear-gradient(
          to top,
          rgba(0, 0, 0, 0.40) 0%,
          transparent 35%
        );
      z-index: 1;
    }

    /* Content wrapper */
    .hero__content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 0 24px;
      max-width: 780px;
      width: 100%;
    }

    /* Eyebrow */
    .hero__eyebrow {
      display: inline-block;
      font-size: 0.70rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #E2C033;
      margin-bottom: 22px;
      text-shadow: 0 1px 6px rgba(0,0,0,0.6);
    }

    /* Gold rule */
    .hero__rule {
      display: block;
      width: 72px;
      height: 1px;
      background: #E2C033;
      margin: 0 auto;
      opacity: 0.85;
    }

    .hero__rule--top {
      margin-bottom: 18px;
    }

    .hero__rule--bottom {
      margin-top: 18px;
      margin-bottom: 24px;
    }

    /* H1 */
    .hero__h1 {
      font-size: clamp(2.4rem, 5.5vw, 3.6rem);
      font-weight: 900;
      line-height: 1.10;
      color: #FFFFFF;
      text-shadow:
        0 2px 12px rgba(0,0,0,0.55),
        0 1px 3px rgba(0,0,0,0.40);
      letter-spacing: -0.01em;
    }

    .hero__h1 span {
      display: block;
      font-size: clamp(1.25rem, 2.8vw, 1.75rem);
      font-weight: 300;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.90);
      margin-top: 6px;
      text-shadow:
        0 1px 8px rgba(0,0,0,0.50);
    }

    /* Tagline */
    .hero__tagline {
      font-size: clamp(0.85rem, 1.6vw, 1rem);
      font-weight: 300;
      line-height: 1.65;
      color: rgba(255,255,255,0.88);
      max-width: 560px;
      margin: 0 auto 32px;
      text-shadow: 0 1px 6px rgba(0,0,0,0.55);
    }

    /* Buttons */
    .hero__ctas {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      font-family: 'Poppins', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      border: none;
      cursor: pointer;
      padding: 13px 28px;
      transition: background 0.22s ease, color 0.22s ease, transform 0.15s ease;
    }

    .btn--primary {
      background: #E2C033;
      color: #000000;
    }

    .btn--primary:hover {
      background: #cbaa1c;
      transform: translateY(-1px);
    }

    .btn--secondary {
      background: transparent;
      color: #FFFFFF;
      border: 1.5px solid rgba(255,255,255,0.65);
    }

    .btn--secondary:hover {
      background: rgba(255,255,255,0.12);
      transform: translateY(-1px);
    }

    /* ── BOTTOM BAR ── */
    .hero__bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 3;
      background: rgba(28, 36, 75, 0.82);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      padding: 13px 32px;
    }

    .hero__bar-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      flex-wrap: wrap;
    }

    .hero__bar-item {
      font-size: 0.70rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.80);
      padding: 0 20px;
      position: relative;
    }

    .hero__bar-item::after {
      content: '';
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 1px;
      height: 10px;
      background: rgba(226,192,51,0.50);
    }

    .hero__bar-item:last-child::after {
      display: none;
    }

    .hero__bar-item--accent {
      color: #E2C033;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .hero {
        height: 580px;
      }

      .hero__rule {
        width: 48px;
      }

      .hero__bar-item {
        padding: 0 12px;
        font-size: 0.65rem;
      }

      .btn {
        padding: 12px 22px;
        font-size: 0.73rem;
      }
    }
  </style>
</head>
<body>

  <section class="hero" aria-label="Tango classes hero">

    <div class="hero__photo" role="img" aria-label="Tango couple dancing in Brussels"></div>
    <div class="hero__vignette" aria-hidden="true"></div>

    <div class="hero__content">
      <p class="hero__eyebrow">Discover Your Tango Journey</p>

      <span class="hero__rule hero__rule--top" aria-hidden="true"></span>

      <h1 class="hero__h1">
        Our Class Offer
        <span>From Beginner to Advanced</span>
      </h1>

      <span class="hero__rule hero__rule--bottom" aria-hidden="true"></span>

      <p class="hero__tagline">
        Welcome to our tango dance school! We offer a wide range of lessons for all levels, from absolute beginners to advanced.
      </p>

      <div class="hero__ctas">
        <a href="#beginners" class="btn btn--primary">Info for Beginners</a>
        <a href="#levels" class="btn btn--secondary">View Levels</a>
      </div>
    </div>

    <div class="hero__bar" aria-label="Key information">
      <div class="hero__bar-inner">
        <span class="hero__bar-item hero__bar-item--accent">5 Levels</span>
        <span class="hero__bar-item">Brussels</span>
        <span class="hero__bar-item">Woluwe</span>
        <span class="hero__bar-item">Free Trial</span>
      </div>
    </div>

  </section>

</body>
</html>
