<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero Redesign F — Bottom Strip + Open Sky</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,600;0,700;0,900;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --black:  #000000;
      --gold:   #E2C033;
      --navy:   #1C244B;
      --accent: #00d084;
      --white:  #FFFFFF;
    }

    body { font-family: 'Poppins', sans-serif; background: #0c0f1e; }

    /* ── HERO ── */
    .hero {
      position: relative;
      min-height: 760px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* PHOTO — fills the top ~70%, barely touched */
    .hero-photo {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .hero-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 22%;
      display: block;
      /* almost untouched — photo speaks for itself */
      filter: brightness(0.88);
      animation: drift 20s ease-in-out infinite alternate;
    }

    @keyframes drift {
      from { transform: scale(1.0); }
      to   { transform: scale(1.04); }
    }

    /* Just the very bottom fades to near-black for the strip */
    .hero-gradient {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 52%;
      z-index: 1;
      background: linear-gradient(
        to top,
        #0c0f1e 0%,
        #0c0f1e 22%,
        rgba(12,15,30,0.9) 42%,
        rgba(12,15,30,0.5) 58%,
        transparent 100%
      );
    }

    /* Thin gold top border */
    .hero-top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--gold);
      z-index: 4;
      transform-origin: left;
      animation: barGrow 1s 0.1s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes barGrow {
      from { transform: scaleX(0); }
      to   { transform: scaleX(1); }
    }

    /* ── CONTENT ── */
    .hero-inner {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 1200px;
      margin: auto auto 0;
      padding: 0 56px 52px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 56px;
      align-items: end;
    }

    /* EYEBROW */
    .hero-label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0;
      animation: fadeUp 0.6s 0.15s ease both;
    }
    .hero-label::before {
      content: '';
      width: 28px;
      height: 1.5px;
      background: var(--gold);
    }

    /* H1 — very large, tight, mixed weight */
    .hero-h1 {
      font-size: clamp(3rem, 5.8vw, 5.8rem);
      font-weight: 900;
      line-height: 0.96;
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeUp 0.75s 0.35s ease both;
    }

    .hero-h1 .line-white {
      display: block;
      color: var(--white);
    }

    .hero-h1 .line-gold {
      display: block;
      /* brushed gold */
      background: linear-gradient(93deg, #c9a820 0%, #f7e27a 40%, #E2C033 70%, #c9a820 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      background-size: 200%;
      animation: shimmer 4s 1.5s ease-in-out infinite alternate;
    }

    @keyframes shimmer {
      from { background-position: 0%; }
      to   { background-position: 100%; }
    }

    .hero-h1 .line-light {
      display: block;
      color: rgba(255,255,255,0.45);
      font-weight: 300;
      font-style: italic;
      font-size: 0.42em;
      letter-spacing: 0.04em;
      line-height: 2.2;
    }

    /* CTA */
    .hero-cta {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeUp 0.7s 0.6s ease both;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.73rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .btn-primary {
      background: var(--gold);
      color: var(--black);
    }
    .btn-primary:hover {
      background: #f0d040;
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(226,192,51,0.4);
    }

    .btn-outline {
      background: transparent;
      color: rgba(255,255,255,0.8);
      border: 1.5px solid rgba(255,255,255,0.25);
    }
    .btn-outline:hover {
      border-color: rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.06);
    }

    /* RIGHT — stacked level badges */
    .hero-levels {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: flex-end;
      opacity: 0;
      animation: slideRight 0.85s 1.0s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes slideRight {
      from { opacity: 0; transform: translateX(28px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .level-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 18px 8px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      font-size: 0.72rem;
      font-weight: 400;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.06em;
      cursor: default;
      transition: all 0.2s ease;
    }

    .level-badge:hover {
      background: rgba(255,255,255,0.09);
      color: rgba(255,255,255,0.75);
      border-color: rgba(255,255,255,0.22);
    }

    .level-badge.active {
      background: rgba(226,192,51,0.12);
      border-color: rgba(226,192,51,0.4);
      color: var(--gold);
      font-weight: 600;
      padding-left: 10px;
      border-left: 3px solid var(--gold);
    }

    .level-num {
      font-size: 0.52rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.2);
    }

    .level-badge.active .level-num { color: rgba(226,192,51,0.5); }

    /* Grain overlay */
    .hero-grain {
      position: absolute;
      inset: 0;
      z-index: 3;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      background-size: 180px;
      opacity: 0.03;
      pointer-events: none;
    }

    /* Scroll */
    .hero-scroll {
      position: absolute;
      bottom: 18px;
      right: 56px;
      z-index: 4;
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0;
      animation: fadeUp 0.6s 1.6s ease both;
    }

    .scroll-label {
      font-size: 0.5rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
    }

    .scroll-line {
      width: 36px;
      height: 1px;
      background: linear-gradient(to right, rgba(255,255,255,0.3), transparent);
      animation: scrollAnim 2s 2.2s ease-in-out infinite;
    }

    @keyframes scrollAnim { 0%,100% { opacity:0.35 } 50% { opacity:1 } }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 860px) {
      .hero { min-height: 620px; }
      .hero-inner { grid-template-columns: 1fr; padding: 0 28px 48px; gap: 32px; }
      .hero-levels { align-items: flex-start; flex-direction: row; flex-wrap: wrap; }
      .hero-scroll { right: 28px; }
    }
  </style>
</head>
<body>
  <!-- HERO F — BOTTOM STRIP + OPEN SKY (PHOTO FULLY VISIBLE) -->
  <section class="hero" aria-label="Tango Classes Hero">
    <div class="hero-top-bar"></div>

    <div class="hero-photo">
      <img src="../images/Tango-classes-in-Brussels.png" alt="Tango class in Brussels" width="1600" height="760">
    </div>
    <div class="hero-gradient"></div>
    <div class="hero-grain"></div>

    <div class="hero-inner">
      <!-- LEFT: text -->
      <div>
        <p class="hero-label">Discover Your Tango Journey</p>
        <h1 class="hero-h1">
          <span class="line-white">Our</span>
          <span class="line-gold">Class Offer</span>
          <span class="line-light">From Beginner to Advanced — every level, every step.</span>
        </h1>
        <div class="hero-cta">
          <a href="../tango-classes/beginners/" class="btn btn-primary">Info for Beginners</a>
          <a href="../tango-classes/experienced/#choose-your-level" class="btn btn-outline">View Levels</a>
        </div>
      </div>

      <!-- RIGHT: level badges -->
      <div class="hero-levels" aria-label="Class levels">
        <div class="level-badge active">
          <span class="level-num">01</span>
          Beginner
        </div>
        <div class="level-badge">
          <span class="level-num">02</span>
          First Year
        </div>
        <div class="level-badge">
          <span class="level-num">03</span>
          Second Year
        </div>
        <div class="level-badge">
          <span class="level-num">04</span>
          Intermediate
        </div>
        <div class="level-badge">
          <span class="level-num">05</span>
          Advanced
        </div>
      </div>
    </div>

    <div class="hero-scroll" aria-hidden="true">
      <span class="scroll-label">Scroll</span>
      <div class="scroll-line"></div>
    </div>
  </section>
</body>
</html>
