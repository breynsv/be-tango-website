<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="BE-TANGO – Your dance school for Argentine tango in Brussels and Woluwe. New website coming soon.">
  <title>BE-TANGO – Coming Soon</title>
  <meta name="robots" content="noindex, nofollow">

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="images/cropped-favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="images/cropped-favicon-192x192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="images/cropped-favicon-180x180.png">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #E2C033;
      --black: #000000;
      --navy: #1C244B;
      --white: #FFFFFF;
    }

    html, body {
      height: 100%;
      font-family: 'Poppins', sans-serif;
      background-color: var(--black);
      color: var(--white);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* Background image */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url('images/tango-classes-in-Brussels-2-e1740646913571.webp');
      background-size: cover;
      background-position: center;
      opacity: 0.18;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      max-width: 680px;
      width: 100%;
    }

    .logo {
      margin: 0 auto 2.5rem;
      display: block;
      height: 52px;
      width: auto;
      filter: brightness(0) invert(1);
    }

    .divider {
      width: 60px;
      height: 3px;
      background: var(--gold);
      margin: 0 auto 2rem;
      border-radius: 2px;
    }

    h1 {
      font-size: clamp(1.6rem, 4vw, 2.5rem);
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.2;
      margin-bottom: 1rem;
    }

    h1 span {
      color: var(--gold);
    }

    p {
      font-size: 1rem;
      font-weight: 300;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.75);
      margin-bottom: 2.5rem;
    }

    .contact-links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.75rem;
      border-radius: 6px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      letter-spacing: 0.03em;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .btn:hover {
      opacity: 0.85;
      transform: translateY(-1px);
    }

    .btn-primary {
      background: var(--gold);
      color: var(--black);
    }

    .btn-outline {
      border: 2px solid rgba(255, 255, 255, 0.35);
      color: var(--white);
    }

    .btn-outline:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .footer-note {
      position: fixed;
      bottom: 1.5rem;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.3);
      z-index: 1;
    }

    @media (max-width: 480px) {
      .contact-links { flex-direction: column; align-items: center; }
      .btn { width: 100%; max-width: 280px; justify-content: center; }
    }
  </style>
</head>
<body>

  <div class="content">
    <img src="images/logo-be-tango-300x51.png" alt="BE-TANGO" class="logo">
    <div class="divider"></div>
    <h1>Our new website is<br><span>on its way.</span></h1>
    <p>
      We're putting the finishing touches on a brand-new experience.<br>
      In the meantime, you can still reach us or explore our current classes.
    </p>
    <div class="contact-links">
      <a href="mailto:info@be-tango.be" class="btn btn-primary">Contact us</a>
      <a href="https://www.be-tango.be/tango-classes/" class="btn btn-outline">View classes</a>
    </div>
  </div>

  <p class="footer-note">&copy; 2025 BE-TANGO &mdash; Argentine Tango Brussels &amp; Woluwe</p>

</body>
</html>
