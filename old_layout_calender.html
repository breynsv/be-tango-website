<!DOCTYPE html>
<!--
  OLD CALENDAR MODAL LAYOUT — backup before design-5 redesign (March 2026)
  Open this file in a browser to see the old design.
  The modal opens automatically on load.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Old Calendar Modal Layout — Backup</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; background: #F3F5F8; margin: 0; padding: 0; }

    /* ── OLD CALENDAR MODAL CSS (verbatim from styles.css before redesign) ── */

    .cal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      overflow-y: auto;
    }

    .cal-modal {
      background: #fff;
      border-radius: 12px;
      width: 100%;
      max-width: 640px;
      max-height: 90vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    .cal-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 1.25rem 1.5rem 1rem;
      border-bottom: 1px solid #e2e8f0;
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 1;
    }
    .cal-modal-header h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #0d1b2a;
      margin: 0 0 0.2rem;
    }
    .cal-modal-subtitle {
      font-size: 0.8rem;
      color: #64748b;
      margin: 0;
    }
    .cal-close-btn {
      background: none;
      border: none;
      font-size: 1.5rem;
      line-height: 1;
      cursor: pointer;
      color: #64748b;
      padding: 0 0.25rem;
      margin-left: 1rem;
      flex-shrink: 0;
    }
    .cal-close-btn:hover { color: #0d1b2a; }

    .cal-modal-body {
      padding: 1.25rem 1.5rem;
      flex: 1;
    }

    .cal-month { margin-bottom: 1.75rem; }
    .cal-month-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #0d1b2a;
      margin: 0 0 0.6rem;
      text-transform: capitalize;
    }

    .cal-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0;
      margin-bottom: 0;
      border-left: 1px solid #e2e8f0;
      border-top: 1px solid #e2e8f0;
    }
    .cal-weekdays span {
      text-align: center;
      font-size: 0.7rem;
      font-weight: 600;
      color: #64748b;
      padding: 0.35rem 0;
      text-transform: uppercase;
      border-right: 1px solid #e2e8f0;
      border-bottom: 1px solid #e2e8f0;
      background: #f8fafc;
    }

    .cal-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0;
      border-left: 1px solid #e2e8f0;
    }

    .cal-day {
      text-align: center;
      font-size: 0.78rem;
      padding: 0.5rem 0.15rem;
      border-radius: 0;
      color: #334155;
      min-height: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 1px solid #e2e8f0;
      border-bottom: 1px solid #e2e8f0;
    }
    .cal-day-empty { background: #fafafa; }

    .cal-day.cal-lesson {
      background: #E2C033;
      color: #1a1a1a;
      font-weight: 600;
    }
    .cal-day.cal-practica {
      background: #C0392B;
      color: #fff;
      font-weight: 600;
    }
    .cal-day.cal-today {
      outline: 2px solid #8B1A1A;
      outline-offset: -2px;
    }

    .cal-legend {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid #e2e8f0;
    }
    .cal-legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      color: #64748b;
    }
    .cal-legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .cal-legend-dot.cal-legend-lesson  { background: #E2C033; }
    .cal-legend-dot.cal-legend-practica { background: #C0392B; }

    .cal-modal-footer {
      display: flex;
      gap: 0.75rem;
      padding: 1rem 1.5rem;
      border-top: 1px solid #e2e8f0;
      background: #f8fafc;
      border-radius: 0 0 12px 12px;
      flex-wrap: wrap;
    }
    .cal-btn-pdf,
    .cal-btn-ics {
      flex: 1;
      min-width: 140px;
      font-size: 0.85rem;
      padding: 0.6rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      border: 1px solid #8B1A1A;
      background: transparent;
      color: #8B1A1A;
      transition: background 0.2s, color 0.2s;
      font-family: 'Poppins', sans-serif;
    }
    .cal-btn-pdf:hover,
    .cal-btn-ics:hover {
      background: #8B1A1A;
      color: #fff;
    }
  </style>
</head>
<body>

<div class="cal-overlay" id="modal">
  <div class="cal-modal" role="dialog" aria-modal="true">

    <div class="cal-modal-header">
      <div>
        <h2>Second Year PLUS · Tuesday</h2>
        <p class="cal-modal-subtitle">Starts: 27 January 2026 · 20:00–21:00 · Woluwe-Saint-Pierre</p>
      </div>
      <button class="cal-close-btn" onclick="document.getElementById('modal').remove()">&#x2715;</button>
    </div>

    <div class="cal-modal-body">
      <div id="cal-grid"></div>
      <div class="cal-legend">
        <span class="cal-legend-item"><span class="cal-legend-dot cal-legend-lesson"></span> Tango lesson</span>
        <span class="cal-legend-item"><span class="cal-legend-dot cal-legend-practica"></span> Practice evening</span>
      </div>
    </div>

    <div class="cal-modal-footer">
      <button class="cal-btn-pdf"><i class="fas fa-file-pdf"></i> Download PDF</button>
      <button class="cal-btn-ics"><i class="fas fa-calendar-plus"></i> Add to Calendar (.ics)</button>
    </div>

  </div>
</div>

<script>
  const lessonDates = new Set([
    '2026-01-27','2026-02-03','2026-02-10',
    '2026-03-03','2026-03-10','2026-03-17','2026-03-24','2026-03-31',
    '2026-04-14','2026-04-21','2026-04-28',
    '2026-05-12','2026-05-19','2026-05-26'
  ]);
  const practicaDates = new Set(['2026-06-03']);

  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const weekDays   = ['Mo','Tu','We','Th','Fr','Sa','Su'];

  const months = [
    {y:2026,m:1},{y:2026,m:2},{y:2026,m:3},
    {y:2026,m:4},{y:2026,m:5},{y:2026,m:6}
  ];

  function pad2(n){ return String(n).padStart(2,'0'); }

  let html = '';
  months.forEach(({y, m}) => {
    const daysInMonth = new Date(y, m, 0).getDate();
    const offset = (new Date(y, m - 1, 1).getDay() + 6) % 7;

    html += `<div class="cal-month">`;
    html += `<h4 class="cal-month-title">${monthNames[m-1]} ${y}</h4>`;
    html += `<div class="cal-weekdays">`;
    weekDays.forEach(d => { html += `<span>${d}</span>`; });
    html += `</div><div class="cal-days">`;

    for (let i = 0; i < offset; i++) html += `<div class="cal-day cal-day-empty"></div>`;

    for (let d = 1; d <= daysInMonth; d++) {
      const key = `${y}-${pad2(m)}-${pad2(d)}`;
      let cls = 'cal-day';
      if (lessonDates.has(key))  cls += ' cal-lesson';
      if (practicaDates.has(key)) cls += ' cal-practica';
      html += `<div class="${cls}">${d}</div>`;
    }

    html += `</div></div>`;
  });

  document.getElementById('cal-grid').innerHTML = html;
</script>
</body>
</html>
