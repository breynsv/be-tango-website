<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="BE-TANGO - New website coming soon. Argentine Tango dance school in Brussels & Woluwe.">
  <title>Coming Soon - BE-TANGO</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="images/cropped-favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="images/cropped-favicon-192x192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="images/cropped-favicon-180x180.png">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Full-page background image */
    .hero-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('images/Tango-2048x1365-1.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
    }

    /* Dark overlay */
    .hero-background::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(28, 36, 75, 0.90) 0%, rgba(0, 0, 0, 0.85) 100%);
      z-index: 1;
    }

    /* Content container */
    .coming-soon-content {
      position: relative;
      z-index: 10;
      text-align: center;
      color: white;
      padding: 2rem;
      max-width: 800px;
    }

    /* Logo */
    .logo {
      margin-bottom: 3rem;
    }

    .logo img {
      max-width: 300px;
      height: auto;
    }

    /* Heading */
    h1 {
      font-size: 3.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
      line-height: 1.2;
    }

    .highlight {
      color: #E2C033;
    }

    /* Subheading */
    .tagline {
      font-size: 1.5rem;
      font-weight: 300;
      margin-bottom: 3rem;
      opacity: 0.95;
    }

    /* Button */
    .btn {
      display: inline-block;
      padding: 1rem 2.5rem;
      background-color: #E2C033;
      color: #1c244b;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.125rem;
      border-radius: 8px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(226, 192, 51, 0.3);
    }

    .btn:hover {
      background-color: #d4a017;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(226, 192, 51, 0.4);
    }

    /* Info text */
    .info {
      margin-top: 3rem;
      font-size: 1rem;
      opacity: 0.8;
    }

    /* Responsive */
    @media (max-width: 768px) {
      h1 {
        font-size: 2.5rem;
      }

      .tagline {
        font-size: 1.25rem;
      }

      .logo img {
        max-width: 220px;
      }

      .btn {
        padding: 0.875rem 2rem;
        font-size: 1rem;
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 2rem;
      }

      .tagline {
        font-size: 1.125rem;
      }

      .logo img {
        max-width: 180px;
      }

      .coming-soon-content {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <!-- Full-page hero background -->
  <div class="hero-background"></div>

  <!-- Content -->
  <div class="coming-soon-content">

    <!-- Logo -->
    <div class="logo">
      <img src="images/logo-be-tango.png" alt="BE-TANGO">
    </div>

    <!-- Heading -->
    <h1>New Website<br><span class="highlight">Coming Soon</span></h1>

    <!-- Tagline -->
    <p class="tagline">We're working on something exciting!</p>

    <!-- Button to current site -->
    <a href="https://www.be-tango.com" class="btn">Visit Current Website</a>

    <!-- Info -->
    <p class="info">Argentine Tango Dance School<br>Brussels & Woluwe-Saint-Pierre, Belgium</p>

  </div>

</body>
</html>
